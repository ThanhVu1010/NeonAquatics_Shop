<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - NeonAquatics</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
        rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0B0F19",
                        "primary-accent": "#2563eb",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0B0F19",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display bg-pattern">
    <div class="flex-1 flex items-center justify-center p-6 relative overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>

        <div class="layout-content-container flex flex-col max-w-[480px] w-full z-10">
            <div class="glass-card p-8 rounded-xl shadow-2xl flex flex-col gap-6 border border-primary-accent/20">
                <div class="flex flex-col items-center justify-center mb-6 mt-4 relative group cursor-default">
                    <div class="rounded-2xl overflow-hidden shadow-lg border border-slate-200">
                        <img src="assets/logo.jpg" alt="NeonAquatics Logo"
                            class="w-40 h-40 object-cover relative z-10 group-hover:scale-105 transition-transform duration-500">
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-700 text-sm font-bold px-1">Tên đăng nhập</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary-accent/50 text-xl">person</span>
                            <input id="loginUsername"
                                class="w-full bg-slate-100 border border-slate-200 rounded-lg py-3.5 pl-12 pr-4 text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-accent/50 focus:border-primary-accent transition-all"
                                placeholder="Nhập tên đăng nhập của bạn" type="text"
                                onkeypress="if(event.key === 'Enter') login()" />
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-700 text-sm font-bold px-1">Mật khẩu</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary-accent/50 text-xl">lock</span>
                            <input id="loginPassword"
                                class="w-full bg-slate-100 border border-slate-200 rounded-lg py-3.5 pl-12 pr-12 text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-accent/50 focus:border-primary-accent transition-all"
                                placeholder="Nhập mật khẩu của bạn" type="password"
                                onkeypress="if(event.key === 'Enter') login()" />
                        </div>
                    </div>
                    <p id="errorMessage" class="text-red-500 text-sm font-medium text-center hidden"></p>
                </div>

                <div class="mt-2">
                    <button onclick="login()"
                        class="w-full bg-primary text-white font-bold py-4 rounded-lg neon-glow transition-all active:scale-[0.98] flex items-center justify-center gap-2 uppercase tracking-wider">
                        <span>Đăng Nhập</span>
                        <span class="material-symbols-outlined font-bold">arrow_forward</span>
                    </button>
                </div>
            </div>
            <footer class="mt-8 text-center">
                <p class="text-slate-500 text-xs tracking-wide">
                    © 2024 NeonAquatics Digital Experience. All rights reserved.
                </p>
            </footer>
        </div>
    </div>

    <div class="fixed inset-0 pointer-events-none z-0 opacity-20">
        <svg class="absolute bottom-0 left-0 w-full" preserveAspectRatio="none" viewBox="0 0 1440 320">
            <path
                d="M0,192L48,176C96,160,192,128,288,128C384,128,480,160,576,186.7C672,213,768,235,864,218.7C960,203,1056,149,1152,133.3C1248,117,1344,139,1392,149.3L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"
                fill="#1fe7f9" fill-opacity="0.3"></path>
        </svg>
    </div>

    <!-- Login Logic -->
    <script>
        const API_BASE = window.location.origin;

        // Nếu đã có token, chuyển thẳng vào trang chính
        (async function verifyExistingSession() {
            const token = localStorage.getItem('bgm_token');
            if (!token) return;

            try {
                const res = await fetch(`${API_BASE}/api/auth/verify`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` },
                    cache: 'no-store'
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    window.location.href = 'index.html';
                } else {
                    localStorage.removeItem('bgm_token');
                    localStorage.removeItem('bgm_user');
                }
            } catch (err) {
                localStorage.removeItem('bgm_token');
                localStorage.removeItem('bgm_user');
            }
        })();

        async function login() {
            const usernameInput = document.getElementById('loginUsername').value;
            const passwordInput = document.getElementById('loginPassword').value;
            const errorMsg = document.getElementById('errorMessage');

            errorMsg.classList.add('hidden');

            if (!usernameInput || !passwordInput) {
                errorMsg.textContent = 'Vui lòng nhập tài khoản và mật khẩu';
                errorMsg.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('bgm_token', data.data.token);
                    localStorage.setItem('bgm_user', JSON.stringify(data.data.user));
                    window.location.href = 'index.html';
                } else {
                    errorMsg.textContent = data.message;
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'Lỗi kết nối máy chủ';
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>

</html>
