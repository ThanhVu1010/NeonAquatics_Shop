<!DOCTYPE html>
<html lang="vi" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ của tôi - NeonAquatics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',
                        secondary: '#38bdf8',
                        dark: '#0f172a',
                        darker: '#020617',
                        card: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-darker text-slate-300 font-sans min-h-screen flex flex-col selection:bg-primary/30">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 glass border-b border-primary/20 backdrop-blur-md bg-darker/80">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
                <span class="font-bold hidden sm:inline">Quay lại Cửa Hàng</span>
            </a>

            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 text-primary">
                    <span class="material-symbols-outlined">person</span>
                    <span id="navUserName" class="font-bold text-sm">...</span>
                </div>
                <button id="logoutBtn" class="p-2 text-slate-400 hover:text-red-400 transition-colors"
                    title="Đăng xuất">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8">

        <div class="max-w-4xl mx-auto">
            <div
                class="glass-card rounded-2xl p-6 mb-8 border border-primary/20 bg-gradient-to-r from-primary/5 to-transparent">
                <div class="flex items-center gap-4 mb-4">
                    <div
                        class="w-16 h-16 rounded-full bg-darker flex items-center justify-center border-2 border-primary text-primary text-2xl font-bold shadow-[0_0_15px_rgba(14,165,233,0.3)]">
                        <span class="material-symbols-outlined !text-3xl">sentiment_satisfied</span>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-white" id="profileName">Xin chào!</h1>
                        <p class="text-slate-400" id="profilePhone">Tải thông tin...</p>
                    </div>
                </div>
                <div class="flex items-center gap-2 text-sm text-slate-400 mt-2">
                    <span class="material-symbols-outlined text-[18px]">location_on</span>
                    <span id="profileAddress">Đang tải...</span>
                </div>
            </div>

            <!-- Orders Section -->
            <div>
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">receipt_long</span>
                    Lịch Sử Đơn Hàng Của Bạn
                </h2>

                <div id="ordersContainer" class="space-y-4">
                    <!-- Orders inject here -->
                    <div class="text-center py-12 text-slate-500">Đang tải dữ liệu...</div>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-800 bg-dark py-6 mt-auto">
        <div class="container mx-auto px-4 text-center text-slate-500">
            <p>&copy; 2026 NeonAquatics.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
