<!DOCTYPE html>
<html lang="vi" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - NeonAquatics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',
                        secondary: '#38bdf8',
                        dark: '#0f172a',
                        darker: '#020617',
                        card: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .neon-border {
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.3), inset 0 0 10px rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.4);
        }
    </style>
</head>

<body class="bg-darker text-slate-300 font-sans min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background Effects -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute -top-[20%] -right-[10%] w-[50%] h-[50%] bg-primary/20 rounded-full blur-[120px]"></div>
        <div class="absolute -bottom-[20%] -left-[10%] w-[50%] h-[50%] bg-secondary/15 rounded-full blur-[100px]"></div>
    </div>

    <!-- Main Container -->
    <div class="w-full max-w-md p-6 relative z-10 animate-fade-in-up">

        <!-- Logo -->
        <div class="text-center mb-8 inline-block w-full">
            <a href="/" class="inline-flex items-center gap-3 group mx-auto">
                <div
                    class="w-14 h-14 rounded-2xl bg-gradient-to-br from-primary to-secondary p-[2px] shadow-[0_0_20px_rgba(14,165,233,0.5)] group-hover:shadow-[0_0_30px_rgba(14,165,233,0.8)] transition-all duration-300">
                    <img src="assets/logo-removebg-preview.png" alt="Logo"
                        class="w-full h-full object-contain rounded-xl bg-darker">
                </div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
                    NEONAQUATICS</h1>
            </a>
            <p class="text-slate-400 mt-2">Dành cho Khách Hàng</p>
        </div>

        <div class="glass-card rounded-2xl p-8 neon-border relative overflow-hidden">
            <!-- Modal Tabs (Login / Register) -->
            <div class="flex border-b border-slate-700 mb-6">
                <button id="tabLogin"
                    class="flex-1 pb-3 text-center font-bold text-primary border-b-2 border-primary transition-colors focus:outline-none">
                    Đăng Nhập
                </button>
                <button id="tabRegister"
                    class="flex-1 pb-3 text-center font-bold text-slate-500 border-b-2 border-transparent hover:text-slate-300 transition-colors focus:outline-none">
                    Đăng Ký
                </button>
            </div>

            <!-- Toast Container -->
            <div id="toastContainer" class="fixed top-4 right-4 z-[100] flex flex-col gap-2"></div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-5 block">
                <div class="space-y-1">
                    <label class="block text-sm font-medium text-slate-300">Tên đăng nhập</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                            <span class="material-symbols-outlined text-[20px]">person</span>
                        </span>
                        <input type="text" id="loginUsername" required
                            class="w-full bg-dark/50 border border-slate-700 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-white placeholder-slate-500"
                            placeholder="Nhập tên đăng nhập">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-sm font-medium text-slate-300">Mật khẩu</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                            <span class="material-symbols-outlined text-[20px]">lock</span>
                        </span>
                        <input type="password" id="loginPassword" required
                            class="w-full bg-dark/50 border border-slate-700 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-white placeholder-slate-500"
                            placeholder="Nhập mật khẩu">
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-primary to-secondary text-white font-bold py-3 rounded-xl hover:shadow-[0_0_20px_rgba(14,165,233,0.5)] transition-all flex items-center justify-center gap-2 group mt-2">
                    <span>Đăng nhập ngay</span>
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">login</span>
                </button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="space-y-4 hidden">
                <div class="space-y-1">
                    <label class="block text-sm font-medium text-slate-300">Họ và Tên <span
                            class="text-red-500">*</span></label>
                    <input type="text" id="regName" required
                        class="w-full bg-dark/50 border border-slate-700 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-primary transition-colors text-white">
                </div>
                <div class="space-y-1">
                    <label class="block text-sm font-medium text-slate-300">Số Điện Thoại <span
                            class="text-red-500">*</span></label>
                    <input type="text" id="regPhone" required
                        class="w-full bg-dark/50 border border-slate-700 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-primary transition-colors text-white">
                </div>
                <div class="space-y-1">
                    <label class="block text-sm font-medium text-slate-300">Tên Đăng Nhập <span
                            class="text-red-500">*</span></label>
                    <input type="text" id="regUsername" required
                        class="w-full bg-dark/50 border border-slate-700 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-primary transition-colors text-white">
                </div>
                <div class="space-y-1">
                    <label class="block text-sm font-medium text-slate-300">Mật khẩu <span
                            class="text-red-500">*</span></label>
                    <input type="password" id="regPassword" required
                        class="w-full bg-dark/50 border border-slate-700 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-primary transition-colors text-white">
                </div>
                <div class="space-y-1">
                    <label class="block text-sm font-medium text-slate-300">Địa chỉ giao hàng (Tuỳ chọn)</label>
                    <input type="text" id="regAddress"
                        class="w-full bg-dark/50 border border-slate-700 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-primary transition-colors text-white">
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-primary to-secondary text-white font-bold py-3 rounded-xl hover:shadow-[0_0_20px_rgba(14,165,233,0.5)] transition-all mt-4">
                    Tạo Tài Khoản
                </button>
            </form>
        </div>

        <div class="text-center mt-6">
            <a href="/admin" class="text-sm text-slate-500 hover:text-primary transition-colors">Dành cho Quản trị viên
                (Admin)</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
